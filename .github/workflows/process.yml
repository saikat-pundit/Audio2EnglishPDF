name: "Audio to English PDF"

on:
  workflow_dispatch:
    inputs:
      drive_links:
        description: "Google Drive shareable link(s) – separate multiple links with commas"
        required: true
        type: string

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache Hugging Face models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-huggingface-${{ hashFiles('process.py') }}
          restore-keys: |
            ${{ runner.os }}-huggingface-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
      - name: Cache Whisper model
        uses: actions/cache@v5
        with:
          path: ~/.cache/whisper
          key: whisper-large-${{ runner.os }}
          restore-keys: |
            whisper-large-${{ runner.os }}
          
      - name: Process all links in parallel
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python process.py "${{ github.event.inputs.drive_links }}"

      - name: Create or update Release and upload all PDFs
        uses: softprops/action-gh-release@v3
        with:
          tag_name: output-pdfs
          name: "Output PDF Files"
          files: "*.pdf"
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
